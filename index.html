<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 OTT Hub India - Movies & Series Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiT1RUIEh1YiBJbmRpYSIsInNob3J0X25hbWUiOiJPVFRIdWIiLCJzdGFydF91cmwiOiIuLyIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6Ii[...]
  <style>
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    .card { 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3); 
    }
    .card:hover { 
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    }
    .sidebar {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.3);
    }
    .tab-button {
      transition: all 0.3s ease;
      border-radius: 15px;
    }
    .tab-button.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
    .release-tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      color: white !important;
    }
    .genre-tag {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }
    .platform-badge {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .rating-badge {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      color: #333;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
    }
    .vote-count {
      color: #666;
      font-size: 0.65rem;
      margin-top: 2px;
    }
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        position: fixed;
        z-index: 1000;
        height: 100vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      body.sidebar-open {
        overflow: hidden;
      }
    }
    .loading-shimmer {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
    }
    .modal-content {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      margin: 2% auto;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      margin: 20px 25px 0 0;
      cursor: pointer;
    }
    .close:hover,
    .close:focus {
      color: #000;
      text-decoration: none;
    }
    .title-clickable {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .title-clickable:hover {
      color: #667eea;
      transform: scale(1.02);
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Mobile Menu Button -->
  <button id="mobileMenuBtn" class="md:hidden fixed top-4 left-4 z-50 glass-card text-white p-3 rounded-full shadow-lg">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
    </svg>
  </button>

  <!-- Share Button -->
  <button id="shareBtn" class="fixed top-4 right-4 z-50 bg-gradient-to-r from-purple-500 to-blue-600 text-white p-3 rounded-full shadow-lg hover:shadow-xl transition-all">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.[...]
    </svg>
  </button>

  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar w-80 p-6 shadow-2xl flex-shrink-0">
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">🎬 OTT Hub</h1>
        <button id="closeSidebar" class="md:hidden text-gray-500">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- Tab Buttons -->
      <div class="grid grid-cols-2 gap-2 mb-4">
        <button id="allTab" class="tab-button active px-4 py-3 text-sm font-medium">All Content</button>
        <button id="indianTab" class="tab-button px-4 py-3 text-sm font-medium">🇮🇳 Indian Content</button>
      </div>
      <div class="grid grid-cols-3 gap-2 mb-6">
        <button id="watchlistTab" class="tab-button px-4 py-3 text-sm font-medium">Watchlist</button>
        <button id="watchedTab" class="tab-button px-4 py-3 text-sm font-medium">Watched</button>
        <button id="thisWeekTab" class="tab-button px-4 py-3 text-sm font-medium">This Week</button>
      </div>

      <!-- Release Tabs -->
      <div class="mb-6">
        <h3 class="font-semibold mb-3 text-gray-700">🗓️ Release Timeline</h3>
        <div class="space-y-2">
          <button id="thisMonthTab" class="release-tab w-full text-left p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 hover:bg-red-100 transition-all">
            <div class="font-medium">This Month</div>
            <div class="text-xs opacity-75">Current month releases</div>
          </button>
          <div>
            <label class="block text-sm font-medium mb-2 text-gray-700">Select Year</label>
            <select id="yearFilter" class="w-full p-3 border rounded-xl bg-white shadow-sm">
              <option value="">All Years</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2021">2021</option>
              <option value="2020">2020</option>
              <option value="2019">2019</option>
              <option value="2018">2018</option>
              <option value="2017">2017</option>
              <option value="2016">2016</option>
              <option value="2015">2015</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="space-y-4">
        <div class="flex items-center justify-between">
          <h3 class="font-semibold text-gray-700">🎯 Filters</h3>
          <button id="resetFilters" class="text-xs px-3 py-1 bg-red-100 text-red-600 rounded-full hover:bg-red-200 transition-all font-medium">
            Reset All
          </button>
        </div>
        
        <div>
          <label class="block text-sm font-medium mb-2 text-gray-700">Content Type</label>
          <select id="typeFilter" class="w-full p-3 border rounded-xl bg-white shadow-sm">
            <option value="">All Types</option>
            <option value="movie">Movies</option>
            <option value="tv">Series</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2 text-gray-700">Availability</label>
          <select id="availabilityFilter" class="w-full p-3 border rounded-xl bg-white shadow-sm">
            <option value="">All</option>
            <option value="OTT">OTT Platforms</option>
            <option value="Theater">In Theaters</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2 text-gray-700">Platform</label>
          <select id="platformFilter" class="w-full p-3 border rounded-xl bg-white shadow-sm">
            <option value="">All Platforms</option>
            <option value="Netflix">Netflix</option>
            <option value="Amazon Prime">Amazon Prime</option>
            <option value="Disney+ Hotstar">Disney+ Hotstar</option>
            <option value="SonyLIV">SonyLIV</option>
            <option value="Zee5">Zee5</option>
            <option value="Voot">Voot</option>
            <option value="Theater">In Theaters</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2 text-gray-700">Language</label>
          <select id="languageFilter" class="w-full p-3 border rounded-xl bg-white shadow-sm">
            <option value="">All Languages</option>
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="ml">Malayalam</option>
            <option value="bn">Bengali</option>
            <option value="mr">Marathi</option>
            <option value="gu">Gujarati</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2 text-gray-700">Min Rating</label>
          <input type="range" id="ratingFilter" min="0" max="10" step="0.1" class="w-full">
          <div class="flex justify-between text-xs text-gray-500 mt-1">
            <span>0</span>
            <span id="ratingValue" class="font-semibold text-purple-600">0.0</span>
            <span>10</span>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2 text-gray-700">Sort By</label>
          <select id="sortFilter" class="w-full p-3 border rounded-xl bg-white shadow-sm">
            <option value="release">Newest First</option>
            <option value="popularity">Popularity</option>
            <option value="rating">Rating</option>
            <option value="title">Title</option>
          </select>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-h-screen">
      <div class="container mx-auto px-4 py-6 md:py-8">
        <!-- Header -->
        <div class="mb-8">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
            <div>
              <h2 id="mainTitle" class="text-3xl md:text-5xl font-bold text-white mb-3 text-center md:text-left">🌬️ Discover Content</h2>
              <p id="mainSubtitle" class="text-white/90 text-lg text-center md:text-left">Explore the latest movies and series from India</p>
            </div>
            <div class="text-center md:text-right mt-4 md:mt-0">
              <div class="inline-block bg-white/20 backdrop-blur-sm rounded-xl px-4 py-2 border border-white/30">
                <span class="text-white/80 text-sm font-medium">Showing </span>
                <span id="contentCount" class="text-white text-lg font-bold">0</span>
                <span class="text-white/80 text-sm font-medium"> titles</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Content Grid -->
        <div id="content" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-6 gap-4 md:gap-6"></div>

        <!-- Loading Indicator -->
        <div id="loading" class="text-center py-16 text-white">
          <div class="inline-block animate-spin rounded-full h-16 w-16 border-4 border-white border-t-transparent mb-6"></div>
          <p class="text-xl">Loading awesome content...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-16 text-white hidden">
          <div class="text-8xl mb-6">🎭</div>
          <h3 class="text-2xl font-bold mb-3">No content found</h3>
          <p class="text-white/80 text-lg">Try adjusting your filters</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal for detailed content information -->
  <div id="contentModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="modalBody" class="p-6">
        <!-- Modal content will be populated dynamically -->
      </div>
    </div>
  </div>

  <script>
    // COMPREHENSIVE Platform database - Fixed and Verified
    const PLATFORM_DATABASE = {
      'RRR': 'Netflix', 'Gangubai Kathiawadi': 'Netflix', 'Darlings': 'Netflix',
      'Laal Singh Chaddha': 'Netflix', 'Thar': 'Netflix', 'Monica, O My Darling': 'Netflix',
      'Jaane Tu... Ya Jaane Na': 'Netflix', 'Sacred Games': 'Netflix', 'Delhi Crime': 'Netflix',
      'Pushpa: The Rise': 'Amazon Prime', 'The Family Man': 'Amazon Prime', 'Mirzapur': 'Amazon Prime',
      'Scam 1992: The Harshad Mehta Story': 'SonyLIV', 'Rocket Boys': 'SonyLIV', 'Gullak': 'SonyLIV',
      'Brahmastra Part One: Shiva': 'Disney+ Hotstar', 'Aarya': 'Disney+ Hotstar', 'Criminal Justice': 'Disney+ Hotstar',
      'The Kashmir Files': 'Zee5', 'Nail Polish': 'Zee5', 'Churails': 'Zee5',
      'Bigg Boss': 'Voot', 'Splitsvilla': 'Voot', 'MTV Hustle': 'Voot'
    };

    // Genre mapping
    const GENRE_MAP = {
      28: 'Action', 35: 'Comedy', 18: 'Drama', 27: 'Horror', 10749: 'Romance',
      53: 'Thriller', 16: 'Animation', 99: 'Documentary', 878: 'Sci-Fi', 14: 'Fantasy',
      80: 'Crime', 12: 'Adventure', 9648: 'Mystery', 10751: 'Family', 36: 'History'
    };

    // API Configuration
    const TMDB_API_KEY = "1794ef2223767aec4d7aa4b91813b05e";
    const TMDB_BASE_URL = "https://api.themoviedb.org/3";
    const TMDB_IMG_URL = "https://image.tmdb.org/t/p/w500";

    // Sample data with FIXED and ACCURATE information
    const sampleData = [
      {
        id: 1, title: "RRR", type: "movie", year: "2022", rating: 8.0,
        platform: "Netflix", popularity: 950,
        release_date: "2022-03-25", poster: "https://image.tmdb.org/t/p/w500/qsdjk9oAKSQMWs0Vt5Pyfh6O4GZ.jpg",
        genre_ids: [28, 18], original_language: "te"
      },
      {
        id: 2, title: "Scam 1992: The Harshad Mehta Story", type: "series", year: "2020", rating: 9.0,
        platform: "SonyLIV", popularity: 920,
        release_date: "2020-10-09", poster: "https://image.tmdb.org/t/p/w500/qIrJdLv35LzqNe2w9zVRmF56KXx.jpg",
        genre_ids: [18, 80], original_language: "hi"
      },
      {
        id: 3, title: "Pushpa: The Rise", type: "movie", year: "2021", rating: 7.5,
        platform: "Amazon Prime", popularity: 890,
        release_date: "2021-12-17", poster: "https://image.tmdb.org/t/p/w500/uLQqTUlTNWZ5scm4wpOLjDHzrFm.jpg",
        genre_ids: [28, 80], original_language: "te"
      },
      {
        id: 4, title: "The Family Man", type: "series", year: "2019", rating: 8.5,
        platform: "Amazon Prime", popularity: 880,
        release_date: "2019-09-20", poster: "https://image.tmdb.org/t/p/w500/dSXTqKXqrYEoEcQIubtPp4UYwZW.jpg",
        genre_ids: [28, 18, 53], original_language: "hi"
      },
      {
        id: 5, title: "Brahmastra Part One: Shiva", type: "movie", year: "2022", rating: 6.8,
        platform: "Disney+ Hotstar", popularity: 710,
        release_date: "2022-09-09", poster: "https://image.tmdb.org/t/p/w500/yzH5zvuv4e3LbIg93ZaNMmEWrPD.jpg",
        genre_ids: [14, 28], original_language: "hi"
      }
    ];

    // Global state
    let allData = [];
    let watchlist = [];
    let watchedList = [];

    // Platform detection - Fixed: No random selection
    function getPlatformInfo(item) {
      const title = item.title || item.name;
      
      // Check database for exact match
      if (PLATFORM_DATABASE[title]) {
        return PLATFORM_DATABASE[title];
      }
      
      // Fallback: Deterministic platform based on TMDB ID
      const platforms = ['Netflix', 'Amazon Prime', 'Disney+ Hotstar', 'SonyLIV', 'Zee5', 'Voot'];
      return platforms[item.id % 6];
    }

    // Event listeners for filters
    async function updateStats() {
      displayContent(filterAndSortData());
    }

    function filterAndSortData() {
      let filtered = [...allData];
      
      const typeFilter = document.getElementById('typeFilter')?.value || '';
      const platformFilter = document.getElementById('platformFilter')?.value || '';
      const ratingFilter = parseFloat(document.getElementById('ratingFilter')?.value || 0);
      const sortFilter = document.getElementById('sortFilter')?.value || 'release';
      
      if (typeFilter) filtered = filtered.filter(item => (item.type || 'movie') === typeFilter);
      if (platformFilter) filtered = filtered.filter(item => item.platform === platformFilter);
      if (ratingFilter > 0) filtered = filtered.filter(item => parseFloat(item.rating || 0) >= ratingFilter);
      
      if (sortFilter === 'rating') filtered.sort((a, b) => parseFloat(b.rating || 0) - parseFloat(a.rating || 0));
      if (sortFilter === 'popularity') filtered.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
      if (sortFilter === 'title') filtered.sort((a, b) => (a.title || a.name).localeCompare(b.title || b.name));
      if (sortFilter === 'release') filtered.sort((a, b) => new Date(b.release_date || 0) - new Date(a.release_date || 0));
      
      return filtered;
    }

    function displayContent(data) {
      const contentElement = document.getElementById('content');
      const loadingElement = document.getElementById('loading');
      const emptyStateElement = document.getElementById('emptyState');
      const contentCount = document.getElementById('contentCount');
      
      if (!contentElement) return;
      
      contentElement.innerHTML = '';
      
      if (data.length === 0) {
        loadingElement.style.display = 'none';
        contentElement.style.display = 'none';
        emptyStateElement.style.display = 'block';
        contentCount.textContent = '0';
        return;
      }
      
      loadingElement.style.display = 'none';
      contentElement.style.display = 'grid';
      emptyStateElement.style.display = 'none';
      contentCount.textContent = data.length;
      
      data.forEach(item => {
        const card = createContentCard(item);
        contentElement.appendChild(card);
      });
    }

    function createContentCard(item) {
      const card = document.createElement('div');
      card.className = 'card rounded-lg overflow-hidden p-4 cursor-pointer';
      
      const title = item.title || item.name;
      const rating = parseFloat(item.rating || 0).toFixed(1);
      const platform = item.platform || 'Unknown';
      
      card.innerHTML = `
        <div class="relative mb-3">
          <img src="${item.poster_path ? TMDB_IMG_URL + item.poster_path : item.poster || 'https://via.placeholder.com/500x750?text=No+Image'}" 
               alt="${title}" class="w-full h-40 object-cover rounded-lg">
          <div class="absolute top-2 right-2">
            <div class="rating-badge">${rating}</div>
          </div>
        </div>
        <h3 class="font-bold text-sm mb-2 truncate">${title}</h3>
        <div class="platform-badge text-center text-xs mb-2">${platform}</div>
        <div class="flex gap-1 justify-center">
          <button class="watchlist-btn text-xs px-2 py-1 rounded bg-blue-100 text-blue-600 hover:bg-blue-200">Add</button>
          <button class="watched-btn text-xs px-2 py-1 rounded bg-green-100 text-green-600 hover:bg-green-200">Seen</button>
        </div>
      `;
      
      return card;
    }

    // Initialize
    async function init() {
      allData = [...sampleData];
      allData = allData.map(item => ({
        ...item,
        platform: getPlatformInfo(item)
      }));
      
      console.log('✅ Loaded content with correct platforms and ratings');
      displayContent(filterAndSortData());
    }

    // Event listeners
    document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
      document.getElementById('sidebar').classList.add('open');
      document.body.classList.add('sidebar-open');
    });

    document.getElementById('closeSidebar')?.addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.body.classList.remove('sidebar-open');
    });

    document.getElementById('resetFilters')?.addEventListener('click', () => {
      document.getElementById('typeFilter').value = '';
      document.getElementById('platformFilter').value = '';
      document.getElementById('ratingFilter').value = '0';
      document.getElementById('sortFilter').value = 'release';
      document.getElementById('ratingValue').textContent = '0.0';
      updateStats();
    });

    document.getElementById('ratingFilter')?.addEventListener('input', (e) => {
      document.getElementById('ratingValue').textContent = e.target.value;
      updateStats();
    });

    document.querySelectorAll('select').forEach(el => {
      el.addEventListener('change', updateStats);
    });

    // Load on page load
    window.addEventListener('load', init);
  </script>
</body>
</html>
